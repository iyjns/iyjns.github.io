<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jujutsu Kaisen Characters</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    .characterButton:hover {
      cursor: pointer;
      box-shadow: 2px 1px 5px 1px;
    }

    .imgContainer {
      background-color: black;
      border-radius: 100px;
      width: 130px;
      height: 130px;
    }

    .imgContainer img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="row mt-5">
      <div class="col">
        <div class="display-3">Jujutsu Kaisen Characters</div>
      </div>
    </div>
    <div class="row">
      <div class="col text-center">
        <nav aria-label="Page navigation example">
          <ul class="pagination">
            <li class="page-item"><a id="prevButton" class="disabled page-link" onclick="prevPage()">Previous</a></li>
            <li class="page-item"><a id="nextButton" class="page-link" onclick="nextPage()">Next</a></li>
          </ul>
        </nav>
      </div>
    </div>
    <div class="row" id="characterContainer">
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous">
  </script>
  <script>
    const characterContainer = document.getElementById("characterContainer");

    let page = 1;

    async function getCharacters() {
      const response = await fetch(`https://api.jikan.moe/v4/anime/40748/characters?page=${page}`);
      const data = await response.json();

      characterContainer.innerHTML = "";

      data.data.forEach(character => {
        const content = `
          <div class="col-12">
            <div class="card rounded-5 shadow p-4 my-3 d-flex flex-row justify-content-start align-items-center">
              <div class="imgContainer">
                <img src="${character.character.images.jpg.image_url || 'https://via.placeholder.com/150'}" alt="${character.character.name}">
              </div>
              <div class="ps-5 h2">${character.character.name}</div>
            </div>
          </div>
        `;
        characterContainer.innerHTML += content;
      });
    }

    const nextButton = document.getElementById("nextButton");
    const prevButton = document.getElementById("prevButton");

    function nextPage() {
      page += 1;
      if (page > 1) {
        prevButton.classList.remove("disabled");
      }

      getCharacters();
    }

    function prevPage() {
      if (page > 1) {
        page -= 1;
      }
      if (page === 1) {
        prevButton.classList.add("disabled");
      }

      getCharacters();
    }

    getCharacters();

  </script>
</body>

</html>
